name: publish container and deploy to production

on:
  push:
    branches:
      - main

jobs:
  publish-container:
    name: build and publish container image
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/web
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: login to github container registry
        uses: docker/login-action@v3
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io

      - name: set up qemu
        uses: docker/setup-qemu-action@v3

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          provenance: mode=max
          sbom: true
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/web:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/web:buildcache,mode=max

  deploy-to-production:
    name: deploy to production
    runs-on: ubuntu-24.04
    needs: [publish-container]

    concurrency:
      group: deploy-production
      cancel-in-progress: false

    environment:
      name: Production
      url: https://devopsglossary.com

    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: set up helm
        uses: azure/setup-helm@v4

      - name: set up kubectl context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_DATA }}
          kubeconfig-encoding: base64

      - name: deploy to staging
        id: helm_deploy
        continue-on-error: true
        shell: bash
        run: >
          helm upgrade --install glossary ./deploy/k8s
          --namespace mareshq-websites-staging
          --wait
          --wait-for-jobs
          --values ./deploy/k8s/values.production.yaml
          --set image.tag=sha-${{ github.sha }}

      - name: collect diagnostics on failure
        if: steps.helm_deploy.outcome == 'failure'
        run: |
          echo "::group::Helm Release Status"
          helm status glossary --namespace mareshq-websites-staging --show-resources || true
          echo "::endgroup::"

          echo "::group::Helm Release History"
          helm history glossary --namespace mareshq-websites-staging || true
          echo "::endgroup::"

          echo "::group::Current Values"
          helm get values glossary --namespace mareshq-websites-staging || true
          echo "::endgroup::"

          echo "::group::Pod Status"
          kubectl get pods -l app.kubernetes.io/name=devopsglossary-web --namespace mareshq-websites-staging -o wide || true
          echo "::endgroup::"

          echo "::group::Pod Events"
          kubectl get events --field-selector involvedObject.kind=Pod --sort-by='.lastTimestamp' --namespace mareshq-websites-staging | tail -30 || true
          echo "::endgroup::"

          echo "::group::Pod Logs (last 50 lines)"
          for pod in $(kubectl get pods -l app.kubernetes.io/name=devopsglossary-web --namespace mareshq-websites-staging -o name 2>/dev/null); do
            echo "--- Logs for $pod ---"
            kubectl logs $pod --tail=50 --all-containers=true --namespace mareshq-websites-staging || true
          done
          echo "::endgroup::"

          echo "::group::Deployment/Job Status"
          kubectl describe deployment,job -l app.kubernetes.io/name=devopsglossary-web --namespace mareshq-websites-staging || true
          echo "::endgroup::"

      - name: Fail the job if Helm deploy failed
        if: steps.helm_deploy.outcome == 'failure'
        run: exit 1
